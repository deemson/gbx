version: 2

project_name: gbx

before:
  hooks:
    - go mod download

builds:
  - id: gbx
    main: .
    binary: gbx
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version=v{{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^chore'
      - '^ci'
      - '^test'
      - '^docs'
      - '^build'

# A formula (not a cask): Homebrew never quarantines formula-installed binaries,
# so the unsigned gbx binary runs without the macOS Gatekeeper warning a cask
# triggers. GoReleaser has deprecated `brews`, but it still works on the pinned
# 2.16 — `goreleaser release` emits a warning and succeeds (only `goreleaser
# check` treats the deprecation as an error).
brews:
  - name: gbx
    repository:
      owner: deemson
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/deemson/gbx"
    description: "Manage your fleet of git repos with a pretty TUI"
    license: "MIT"
    install: |
      bin.install "gbx"
    test: |
      system "#{bin}/gbx", "--help"

release:
  github:
    owner: deemson
    name: gbx
